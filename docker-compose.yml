services:
  frontend:
    build:
      context: ./freto-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - usuario-service

  usuario-service:
    build:
      context: ./freto-backend/usuario-service
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    env_file:
      - .env
    depends_on:
      - rabbitmq


  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${SPRING_RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${SPRING_RABBITMQ_PASSWORD}
