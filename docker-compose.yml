services:
  frontend:
    build:
      context: ./freto-frontend
      dockerfile: Dockerfile
      args:
        - VITE_BASE_URL=/
    ports:
      - "3000:80"

  usuario-service:
    build:
      context: ./freto-backend/usuario-service/
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy

  notificacao-service:
    build:
      context: ./freto-backend/notificacao-service/
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
